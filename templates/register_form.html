{% extends 'base.html' %}

{% block title %}{% if registration %}Edit Registration{% else %}Register Student{% endif %}{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: var(--surface-color);
        padding: 2.5rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .form-header {
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
    }

    .form-header h2 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--text-main);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
    }

    .form-control {
        width: 100%;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        box-sizing: border-box;
    }

    .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-top: 2rem;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 0 1.5rem;
        height: 44px;
        margin: 0;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s;
        text-decoration: none;
        font-family: inherit;
        font-size: 1rem;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
    }

    .btn-primary:hover {
        background: var(--primary-hover);
    }

    .btn-outline {
        background: transparent;
        border-color: var(--border);
        color: var(--text-main);
    }

    .btn-outline:hover {
        background: var(--surface-hover);
    }
</style>

<div class="form-container">
    <div class="form-header">
        <h2>{% if registration %}Edit Registration{% else %}Register Student to Course{% endif %}</h2>
    </div>

    <form id="registerForm" method="POST"
        action="{% if registration %}{{ url_for('student_bp.edit_registration', register_id=registration.register_id) }}{% else %}{{ url_for('student_bp.register_student') }}{% endif %}">

        <div class="form-group">
            <label class="form-label" for="student_id">Select Student</label>
            <select id="student_id" name="student_id" class="form-control" required>
                <option value="">-- Select Student --</option>
                {% for student in students %}
                    <option value="{{ student.student_id }}" {% if registration and registration.student_id == student.student_id %}selected{% endif %}>
                        {{ student.full_name }} ({{ student.email }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="course_id">Select Course</label>
            <select id="course_id" name="course_id" class="form-control" required>
                <option value="">-- Select Course --</option>
                {% for course in courses %}
                    <option value="{{ course.id }}" {% if registration and registration.course_id == course.id %}selected{% endif %}>
                        {{ course.course_name }} ({{ course.technology_stack }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="enrollment_date">Enrollment Date</label>
            <input type="date" id="enrollment_date" name="enrollment_date" class="form-control"
                value="{{ registration.enrollment_date if registration else '' }}" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="batch_id">Assign to Batch (Optional)</label>
            <select id="batch_id" name="batch_id" class="form-control">
                <option value="">-- No Batch --</option>
                {% for batch in batches %}
                    <option value="{{ batch.batch_id }}" {% if registration and registration.batch_id == batch.batch_id %}selected{% endif %}>
                        {{ batch.batch_name }} ({{ batch.batch_code }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="status">Status</label>
            <select id="status" name="status" class="form-control" required>
                <option value="registered" {% if registration and (registration.status == 'registered' or registration.status == 'registed') %}selected{% endif %}>
                    Registered (Enrolled)
                </option>
                <option value="assigned" {% if registration and registration.status == 'assigned' %}selected{% endif %}>
                    Assigned (Batch Allocated)
                </option>
                <option value="discontinued" {% if registration and registration.status == 'discontinued' %}selected{% endif %}>
                    Discontinued (Dropout)
                </option>
                <option value="break" {% if registration and registration.status == 'break' %}selected{% endif %}>
                    Break (Wish to take break)
                </option>
                <option value="completed" {% if registration and registration.status == 'completed' %}selected{% endif %}>
                    Completed (Course Completed)
                </option>
                <option value="hold" {% if registration and registration.status == 'hold' %}selected{% endif %}>
                    Hold (On Hold for Package Course)
                </option>
            </select>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('student_bp.list_register') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Registration</button>
        </div>
    </form>
</div>
{% endblock %}
